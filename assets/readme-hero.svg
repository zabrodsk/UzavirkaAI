<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Uzavirka AI hero banner</title>
  <desc id="desc">Branded hackathon project banner with red construction stripes and product summary.</desc>
  <defs>
    <pattern id="wide-stripe" width="70" height="70" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="32" height="70" fill="#D9381E"/>
      <rect x="32" width="38" height="70" fill="#F1EEE7"/>
    </pattern>
    <pattern id="small-stripe" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="24" fill="#D9381E"/>
      <rect x="10" width="14" height="24" fill="#F1EEE7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F0F0F" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1600" height="820" fill="#F1EEE7"/>
  <rect x="870" y="0" width="730" height="820" fill="url(#wide-stripe)" opacity=".96"/>
  <rect x="0" y="0" width="1600" height="820" fill="none" stroke="#D9D3C9" stroke-width="2"/>

  <g transform="translate(92 82)">
    <rect x="0" y="0" width="42" height="42" rx="9" fill="url(#small-stripe)"/>
    <rect x="10" y="10" width="22" height="22" rx="4" fill="#0F0F0F"/>
    <circle cx="21" cy="21" r="7.5" fill="#F1EEE7"/>
    <rect x="13" y="18" width="16" height="6" rx="2" fill="#D9381E" transform="rotate(-45 21 21)"/>
    <text x="58" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="29" font-weight="700" fill="#77746F">uzavirka.ai</text>
  </g>

  <g transform="translate(92 202)">
    <rect x="0" y="0" width="118" height="118" rx="18" fill="url(#small-stripe)"/>
    <rect x="25" y="25" width="68" height="68" rx="9" fill="#0F0F0F"/>
    <circle cx="59" cy="59" r="23" fill="#F1EEE7"/>
    <rect x="36" y="51" width="46" height="16" rx="5" fill="#D9381E" transform="rotate(-45 59 59)"/>
    <text x="152" y="84" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="96" font-weight="750" letter-spacing="-3" fill="#0F0F0F">uzavirka</text>
    <text x="604" y="84" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="96" font-weight="750" letter-spacing="-3" fill="#D9381E">.</text>
    <text x="633" y="84" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="96" font-weight="750" letter-spacing="-3" fill="#77746F">ai</text>
  </g>

  <text x="94" y="420" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="600" letter-spacing="-1" fill="#222222">
    Decision support for closures.
  </text>
  <text x="94" y="494" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="600" letter-spacing="-1" fill="#222222">
    Risk score. Reasons.
  </text>
  <text x="94" y="568" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="600" letter-spacing="-1" fill="#222222">
    Better window. Map detour.
  </text>

  <line x1="94" y1="650" x2="770" y2="650" stroke="#D9D3C9" stroke-width="3"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="31" font-weight="750">
    <text x="94" y="716" fill="#0F0F0F">B2G · SAAS</text>
    <text x="430" y="716" fill="#0F0F0F">PILOT</text>
    <text x="735" y="716" fill="#0F0F0F">AI OLYMPIAD</text>
    <text x="94" y="758" font-size="25" fill="#77746F">DOPRAVNI ODBORY</text>
    <text x="430" y="758" font-size="25" fill="#77746F">MLADA BOLESLAV</text>
    <text x="735" y="758" font-size="25" fill="#77746F">1ST PLACE</text>
  </g>

  <g transform="translate(1000 445)" filter="url(#shadow)">
    <rect width="420" height="286" fill="#F1EEE7"/>
    <line x1="38" y1="88" x2="382" y2="88" stroke="#D9D3C9" stroke-width="2"/>
    <line x1="38" y1="150" x2="382" y2="150" stroke="#D9D3C9" stroke-width="2"/>
    <line x1="38" y1="212" x2="382" y2="212" stroke="#D9D3C9" stroke-width="2"/>
    <text x="38" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" fill="#77746F">TYP</text>
    <text x="160" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" font-weight="800" fill="#0F0F0F">VYKOP · OPRAVA</text>
    <text x="38" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" fill="#77746F">RIZIKO</text>
    <text x="250" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" font-weight="800" fill="#0F0F0F">0-100</text>
    <text x="38" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" fill="#77746F">VSTUP</text>
    <text x="188" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" font-weight="800" fill="#0F0F0F">UREDNIK · 60 S</text>
    <text x="38" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" fill="#77746F">VYSTUP</text>
    <text x="188" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="28" font-weight="800" fill="#0F0F0F">SCHVALIT / PRESUNOUT</text>
  </g>

  <g transform="translate(1230 70)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="31" font-weight="800" fill="#0F0F0F">
    <text x="0" y="0">README · 2026</text>
    <text x="110" y="46">WINNER BUILD</text>
  </g>
</svg>
