<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">uzavirka.ai logo</title>
  <desc id="desc">Road closure mark with uzavirka.ai wordmark.</desc>
  <defs>
    <pattern id="stripe" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="14" height="28" fill="#D9381E"/>
      <rect x="14" width="14" height="28" fill="#F1EEE7"/>
    </pattern>
  </defs>
  <rect width="720" height="180" fill="#F1EEE7"/>
  <rect x="34" y="34" width="112" height="112" rx="18" fill="url(#stripe)"/>
  <rect x="58" y="58" width="64" height="64" rx="8" fill="#0F0F0F"/>
  <circle cx="90" cy="90" r="22" fill="#F1EEE7"/>
  <rect x="68" y="82" width="44" height="16" rx="5" fill="#D9381E" transform="rotate(-45 90 90)"/>
  <text x="178" y="112" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-2" fill="#0F0F0F">uzavirka</text>
  <text x="533" y="112" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-2" fill="#D9381E">.</text>
  <text x="557" y="112" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-2" fill="#77746F">ai</text>
</svg>
